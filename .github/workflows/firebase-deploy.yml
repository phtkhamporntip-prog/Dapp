name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    outputs:
      has_firebase_creds: ${{ steps.check.outputs.has_creds }}
      auth_method: ${{ steps.check.outputs.auth_method }}
    steps:
      - name: Check Firebase deploy credentials
        id: check
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
            echo "auth_method=service_account" >> "$GITHUB_OUTPUT"
            echo "✅ FIREBASE_SERVICE_ACCOUNT is configured"
          elif [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
            echo "auth_method=token" >> "$GITHUB_OUTPUT"
            echo "✅ FIREBASE_TOKEN is configured"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "auth_method=none" >> "$GITHUB_OUTPUT"
            echo "⚠️  Neither FIREBASE_SERVICE_ACCOUNT nor FIREBASE_TOKEN is configured."
            echo "Firebase Hosting deployment will be skipped."
            echo ""
            echo "To enable deployment, add one of these secrets:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            echo "  • FIREBASE_SERVICE_ACCOUNT  (recommended) – JSON service account key"
            echo "  • FIREBASE_TOKEN            – legacy CI token from 'firebase login:ci'"
            echo ""
            echo "See docs/RELEASE_CHECKLIST.md for details."
          fi

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Onchainweb/package-lock.json

      - name: Install dependencies
        run: cd Onchainweb && npm install

      - name: Build production bundle
        run: cd Onchainweb && npm run build:production
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: Onchainweb/dist
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [validate-secrets, build]
    if: needs.validate-secrets.outputs.has_firebase_creds == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: Onchainweb/dist

      - name: Verify build artifacts
        run: |
          if [ ! -d "Onchainweb/dist" ] || [ -z "$(ls -A Onchainweb/dist)" ]; then
            echo "❌ Build artifacts missing or empty"
            exit 1
          fi
          echo "✅ Build artifacts verified"
          ls -la Onchainweb/dist

      - name: Deploy to Firebase Hosting (service account)
        if: needs.validate-secrets.outputs.auth_method == 'service_account'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          target: hosting
          channelId: live

      - name: Deploy to Firebase Hosting (token)
        if: needs.validate-secrets.outputs.auth_method == 'token'
        run: |
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            echo "❌ FIREBASE_PROJECT_ID repository variable is not set."
            echo "Add it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          npm install -g firebase-tools@13
          firebase deploy --only hosting \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}


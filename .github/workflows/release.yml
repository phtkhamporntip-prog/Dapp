name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Onchainweb/package-lock.json

      - name: Install dependencies
        run: cd Onchainweb && npm install

      - name: Build production bundle
        run: cd Onchainweb && npm run build:production
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}

      - name: Run tests
        run: |
          cd Onchainweb
          if npm run test; then
            echo "✅ Tests passed"
          else
            echo "⚠️  Tests not configured or skipped — proceeding with release"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: Onchainweb/dist
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: Onchainweb/dist

      - name: Create release archive
        run: |
          cd Onchainweb/dist
          zip -r ../../dist-${{ github.ref_name }}.zip .
          cd ../..
          echo "✅ Release archive created: dist-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            dist-${{ github.ref_name }}.zip
          body: |
            ## OnchainWeb ${{ github.ref_name }}

            ### Quick Start
            See [README.md](https://github.com/${{ github.repository }}#readme) for setup instructions.

            ### Deployment
            - **Firebase Hosting**: Automatically deployed via the `firebase-deploy` workflow
            - **Cloudflare**: Deployed via the `cloudflare-deploy` workflow

            ### Checksums
            Attached `dist-${{ github.ref_name }}.zip` contains the production-ready frontend build.

            ### Required Secrets
            See [docs/RELEASE_CHECKLIST.md](https://github.com/${{ github.repository }}/blob/main/docs/RELEASE_CHECKLIST.md) for required secrets and configuration.
